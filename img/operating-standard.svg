    <rect x="68" y="104" width="44" height="8" rx="4" fill="#94a3b8"/>
    <rect x="68" y="122" width="70" height="16" rx="4" fill="#0b1f3a"/>
    <rect x="68" y="148" width="90" height="6" rx="3" fill="#10b981" opacity="0.5"/>
  </g>
  <g>
    <rect x="210" y="88" width="140" height="78" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="226" y="104" width="44" height="8" rx="4" fill="#94a3b8"/>
