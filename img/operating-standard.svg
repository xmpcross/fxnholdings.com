  <circle cx="88" cy="46" r="5" fill="#ffffff" opacity="0.35"/>
  <rect x="120" y="41" width="150" height="10" rx="5" fill="#ffffff" opacity="0.25"/>

  <!-- metric tiles -->
  <g>
