<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440" role="img" aria-label="Operating dashboard">
  <rect width="560" height="440" rx="16" fill="#eef2f7"/>
  <!-- window -->
  <rect x="28" y="28" width="504" height="384" rx="12" fill="#ffffff"/>
  <rect x="28" y="28" width="504" height="384" rx="12" fill="none" stroke="#e2e8f0"/>
  <!-- top bar -->
  <path d="M28 40 a12 12 0 0 1 12 -12 h480 a12 12 0 0 1 12 12 v24 H28 Z" fill="#0b1f3a"/>
