    <rect x="226" y="148" width="72" height="6" rx="3" fill="#10b981" opacity="0.5"/>
  </g>
  <g>
    <rect x="368" y="88" width="140" height="78" rx="10" fill="#0b1f3a"/>
    <rect x="384" y="104" width="44" height="8" rx="4" fill="#64748b"/>
    <rect x="384" y="122" width="74" height="16" rx="4" fill="#34d399"/>
    <rect x="384" y="148" width="84" height="6" rx="3" fill="#ffffff" opacity="0.2"/>
  </g>

  <!-- line chart panel -->
  <g>
    <rect x="52" y="184" width="296" height="196" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="68" y="200" width="60" height="8" rx="4" fill="#94a3b8"/>
