<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Netlify Forms</title>
  </head>
  <body>
    <form name="contact" method="POST" action="/netlify-forms.html" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact">
      <input type="hidden" name="subject" value="[fxnholdings.com] Contact form">
      <input type="text" name="name">
      <input type="email" name="email">
      <input type="text" name="company">
      <input type="text" name="reason">
      <textarea name="message"></textarea>
      <input name="bot-field">
    </form>
  </body>
</html>
